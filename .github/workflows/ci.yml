name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: application
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint (ruff)
        run: ruff check .

      - name: Generate synthetic sample data
        run: python scripts/generate_sample_data.py

      - name: Build sample story.json
        run: python viz/story/build_story_data.py --sample

      - name: Run tests
        run: pytest tests/ -v
